name: "MINT Lab"
title: "MINT Lab — Machine Intelligence and Neural Technologies, Vanderbilt University"
description: "The Machine Intelligence and Neural Technologies (MINT) Lab at Vanderbilt University. Mathematical machine learning, geometric deep learning, and computational optimal transport."

url: https://mint-vu.github.io
baseurl: ""
permalink: /:year/:month/:day/:title.html

email: soheil.kolouri@vanderbilt.edu
github: https://github.com/mint-vu
twitter: https://twitter.com/skolouri
scholar: https://scholar.google.com/citations?user=yREBSy0AAAAJ&hl=en
address: "Department of Computer Science, Vanderbilt University — 400 24th Ave S, Nashville, TN 37212"

markdown: kramdown
highlighter: rouge

sass:
  style: compressed

nav:
  - name: "home"
    href: "/"
  - name: "about"
    href: "/about/"
  - name: "people"
    href: "/people/"
  - name: "publications"
    href: "/publications/"
  - name: "join"
    href: "/join/"

collections:
  people:
    output: true
    permalink: /people/:name/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "people"
    values:
      layout: "profile"

exclude:
  - README.md
  - SETUP.md
  - Gemfile
  - Gemfile.lock
  - vendor
