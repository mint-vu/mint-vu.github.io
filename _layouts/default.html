<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.name }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="shortcut icon" href="{{ '/images/logo/logo_square.png' | relative_url }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ site.url }}/images/lab_photos/CVPR2023_1.jpg">
</head>
<body>

<nav class="site-nav">
  <div class="wrap">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/images/logo/logo_square.png' | relative_url }}" alt="MINT Lab logo">
      <span class="mark"><span>MINT</span> Lab</span>
    </a>
    <button class="nav-toggle" aria-expanded="false" aria-controls="nav-links" onclick="const l=document.getElementById('nav-links');const o=l.classList.toggle('open');this.setAttribute('aria-expanded',o)">menu</button>
    <div class="nav-links" id="nav-links">
      {% for item in site.nav %}
        <a href="{{ item.href | relative_url }}"{% if page.url == item.href %} aria-current="page"{% endif %}>{{ item.name }}</a>
      {% endfor %}
    </div>
  </div>
</nav>

{{ content }}

<footer class="site-footer">
  <div class="wrap">
    <span>Machine Intelligence and Neural Technologies Lab ‒ {{ site.address }}</span>
    <span class="footer-social">
      <a href="{{ site.github }}">github</a>
      <a href="{{ site.twitter }}">twitter</a>
      <a href="{{ site.scholar }}">scholar</a>
      <a href="mailto:{{ site.email }}">email</a>
    </span>
  </div>
</footer>

</body>
</html>
