intro: >
  The **M**achine **I**ntelligence and **N**eural **T**echnologies lab, *MINT*, at
  [Vanderbilt University](https://engineering.vanderbilt.edu/) pursues fundamental research in
  mathematical machine learning and geometric deep learning. We develop Next-Generation
  Machine Learning algorithms grounded in computational optimal transport and geometry —
  addressing sample and label efficiency, explainability, robustness, and lifelong learning.

