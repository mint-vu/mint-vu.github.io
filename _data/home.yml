intro: The **M**achine **I**ntelligence and **N**eural **T**echnologies lab, _MINT_, at [Vanderbilt University](https://engineering.vanderbilt.edu/) pursues fundamental research in mathematical machine learning and geometric deep learning. We develop next-generation machine learning algorithms grounded in computational optimal transport and geometric methods, with a focus on building efficient, robust, and continually adaptive AI systems.
